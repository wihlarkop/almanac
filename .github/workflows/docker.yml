name: Build and Push Docker Image

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build smoke image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: almanac-server:smoke
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run smoke test
        run: |
          set -euo pipefail

          docker run --rm -d --name almanac-smoke -p 8080:8080 almanac-server:smoke

          cleanup() {
            docker logs almanac-smoke || true
            docker rm -f almanac-smoke >/dev/null 2>&1 || true
          }
          trap cleanup EXIT

          for attempt in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/api/v1/health -o health.json; then
              python3 -c "import json; data=json.load(open('health.json')); assert data['success'] is True; assert data['data']['status'] == 'ok'"
              break
            fi
            if [ "$attempt" = "30" ]; then
              echo "Health check did not pass within 30 seconds"
              exit 1
            fi
            sleep 1
          done

          curl -fsS http://127.0.0.1:8080/openapi.json -o openapi.json
          python3 -c "import json; data=json.load(open('openapi.json')); assert data['openapi'].startswith('3.'); assert '/api/v1/models' in data['paths']"

          curl -fsS http://127.0.0.1:8080/api/v1/catalog/health -o catalog-health.json
          python3 -c "import json; data=json.load(open('catalog-health.json')); assert data['success'] is True; assert data['data']['total_models'] > 0"

          curl -fsS http://127.0.0.1:8080/api/v1/models/openai/gpt-4o -o model.json
          python3 -c "import json; data=json.load(open('model.json')); assert data['success'] is True; assert data['data']['id'] == 'gpt-4o'"
