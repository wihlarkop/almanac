name: Validate Schema

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Validate all YAML files
        run: cargo run -p almanac-validator

      - name: Run tests
        run: cargo test

      - name: Build server
        run: cargo build -p almanac-server
