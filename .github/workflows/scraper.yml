name: Scraper

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider name to scrape, or 'all'"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - adobe
          - ai21
          - alibaba
          - amazon
          - anthropic
          - assemblyai
          - baidu
          - bfl
          - bytedance
          - cartesia
          - cohere
          - deepgram
          - deepseek
          - elevenlabs
          - fireworks
          - google
          - heygen
          - hidream
          - ibm
          - ideogram
          - inception
          - inflection
          - inworld
          - jina
          - kling
          - leonardo
          - lightricks
          - lmnt
          - luma
          - meshy
          - meta
          - microsoft
          - minimax
          - mistral
          - moonshot
          - naver
          - nomic
          - nvidia
          - openai
          - perplexity
          - pika
          - pixverse
          - playht
          - recraft
          - reka
          - reve
          - runway
          - snowflake
          - stabilityai
          - stepfun
          - suno
          - synthesia
          - tencent
          - tripo
          - udio
          - upstage
          - vidu
          - voyageai
          - writer
          - xai
          - xiaomi
          - yi
          - zai

concurrency:
  group: scraper
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@1.96.0

      - uses: Swatinem/rust-cache@v2

      - name: Build scraper
        run: cargo build -p almanac-scraper --release

      - name: Run scraper
        run: |
          set -o pipefail
          ./target/release/scraper \
            --provider ${{ inputs.provider }} \
            --root . \
            --write | tee scraper-output.txt

      - name: Validate new files
        run: cargo run -p almanac-validator

      - name: Scraper report
        if: always()
        run: |
          {
            echo "## Scraper report — ${{ inputs.provider }}"
            echo ""
            echo '```'
            grep -E '^Summary:' scraper-output.txt || echo "(no summary)"
            echo '```'
            if grep -qE '\[DRIFT' scraper-output.txt; then
              echo "### ⚠️ Official price drift — verify, not auto-applied"
              echo '```'
              grep -A2 -E '\[DRIFT' scraper-output.txt || true
              echo '```'
            fi
            if grep -qE '\[MISSING FROM DOCS\]' scraper-output.txt; then
              echo "### Models missing from docs (possible upstream deprecation)"
              echo '```'
              grep -E '\[MISSING FROM DOCS\]' scraper-output.txt || true
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check for new model files
        id: check_changes
        run: |
          NEW_FILES=$(git status --short models/ | grep "^?" | wc -l | tr -d ' ')
          MODIFIED=$(git status --short models/ aliases.yaml | grep -v "^?" | wc -l | tr -d ' ')
          echo "new_files=$NEW_FILES" >> $GITHUB_OUTPUT
          echo "modified=$MODIFIED" >> $GITHUB_OUTPUT
          echo "has_changes=$(( NEW_FILES + MODIFIED > 0 ))" >> $GITHUB_OUTPUT
          echo "New: $NEW_FILES, Modified: $MODIFIED"

      - name: Create branch, commit, and open PR
        if: steps.check_changes.outputs.has_changes == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="chore/scraper-${{ inputs.provider }}-${DATE}-${{ github.run_id }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Collect new/modified model files into a temp dir so we can apply
          # them on top of main — prevents the auto-PR from including unrelated
          # commits from whichever branch triggered this workflow.
          TMPDIR=$(mktemp -d)
          git status --short models/ | awk '{print $2}' | while read f; do
            mkdir -p "$TMPDIR/$(dirname $f)"
            cp "$f" "$TMPDIR/$f"
          done

          # Create branch from main, not from the workflow's current branch
          git fetch origin main
          git checkout -b "$BRANCH" origin/main

          # Apply new files
          cp -r "$TMPDIR/models" .

          git add models/
          git commit -m "chore(catalog): scraper run — ${{ inputs.provider }} ${DATE} (#${{ github.run_id }})"

          git push origin "$BRANCH"

          NEW_COUNT=${{ steps.check_changes.outputs.new_files }}
          MOD_COUNT=${{ steps.check_changes.outputs.modified }}

          # Build the PR body, folding in the scraper's review report
          # (price drift on verified entries + models missing from docs).
          {
            echo "## Scraper auto-PR"
            echo ""
            echo "Triggered by \`workflow_dispatch\` on **${{ inputs.provider }}** — ${DATE}."
            echo ""
            echo "| | Count |"
            echo "|---|---|"
            echo "| New model stubs | ${NEW_COUNT} |"
            echo "| Updated entries | ${MOD_COUNT} |"
            echo ""
            grep -E '^Summary:' scraper-output.txt | sed 's/^/> /' || true
            echo ""
            if grep -qE '\[DRIFT' scraper-output.txt; then
              echo "### ⚠️ Official price drift — verify, NOT auto-applied"
              echo "These are human-verified entries whose scraped price differs. The catalog files were left untouched; confirm against the provider before changing."
              echo '```'
              grep -A2 -E '\[DRIFT' scraper-output.txt || true
              echo '```'
              echo ""
            fi
            if grep -qE '\[MISSING FROM DOCS\]' scraper-output.txt; then
              echo "### Models missing from docs (possible upstream deprecation)"
              echo '```'
              grep -E '\[MISSING FROM DOCS\]' scraper-output.txt || true
              echo '```'
              echo ""
            fi
            echo "### Review checklist"
            echo "- [ ] Spot-check a few new model IDs look correct"
            echo "- [ ] Resolve any drift / deprecation alerts above"
            echo "- [ ] Validator passed (confirmed by CI step above)"
            echo "- [ ] Merge when happy"
            echo ""
            echo "> Generated by the almanac scraper. All files passed \`almanac-validator\` before this PR was opened."
          } > pr-body.md

          gh pr create \
            --title "chore(catalog): scraper run — ${{ inputs.provider }} ${DATE}" \
            --body-file pr-body.md \
            --draft \
            --base main \
            --head "$BRANCH"

      - name: No changes found
        if: steps.check_changes.outputs.has_changes == '0'
        run: echo "No new or modified model files found — catalog is already up to date."
