name: Scraper

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "Provider name to scrape, or 'all'"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - adobe
          - ai21
          - alibaba
          - amazon
          - anthropic
          - assemblyai
          - baidu
          - bfl
          - bytedance
          - cartesia
          - cohere
          - deepgram
          - deepseek
          - elevenlabs
          - fireworks
          - google
          - heygen
          - hidream
          - ibm
          - ideogram
          - inception
          - inflection
          - inworld
          - jina
          - kling
          - leonardo
          - lightricks
          - lmnt
          - luma
          - meshy
          - meta
          - microsoft
          - minimax
          - mistral
          - moonshot
          - naver
          - nomic
          - nvidia
          - openai
          - perplexity
          - pika
          - pixverse
          - playht
          - recraft
          - reka
          - reve
          - runway
          - snowflake
          - stabilityai
          - stepfun
          - suno
          - synthesia
          - tencent
          - tripo
          - udio
          - upstage
          - vidu
          - voyageai
          - writer
          - xai
          - xiaomi
          - yi
          - zai

concurrency:
  group: scraper
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@1.95.0

      - uses: Swatinem/rust-cache@v2

      - name: Build scraper
        run: cargo build -p almanac-scraper --release

      - name: Run scraper
        run: |
          ./target/release/scraper \
            --provider ${{ inputs.provider }} \
            --root . \
            --write

      - name: Validate new files
        run: cargo run -p almanac-validator

      - name: Check for new model files
        id: check_changes
        run: |
          NEW_FILES=$(git status --short models/ | grep "^?" | wc -l | tr -d ' ')
          MODIFIED=$(git status --short models/ aliases.yaml | grep -v "^?" | wc -l | tr -d ' ')
          echo "new_files=$NEW_FILES" >> $GITHUB_OUTPUT
          echo "modified=$MODIFIED" >> $GITHUB_OUTPUT
          echo "has_changes=$(( NEW_FILES + MODIFIED > 0 ))" >> $GITHUB_OUTPUT
          echo "New: $NEW_FILES, Modified: $MODIFIED"

      - name: Create branch, commit, and open PR
        if: steps.check_changes.outputs.has_changes == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          BRANCH="chore/scraper-${{ inputs.provider }}-${DATE}-${{ github.run_id }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Collect new/modified model files into a temp dir so we can apply
          # them on top of main — prevents the auto-PR from including unrelated
          # commits from whichever branch triggered this workflow.
          TMPDIR=$(mktemp -d)
          git status --short models/ | awk '{print $2}' | while read f; do
            mkdir -p "$TMPDIR/$(dirname $f)"
            cp "$f" "$TMPDIR/$f"
          done

          # Create branch from main, not from the workflow's current branch
          git fetch origin main
          git checkout -b "$BRANCH" origin/main

          # Apply new files
          cp -r "$TMPDIR/models" .

          git add models/
          git commit -m "chore(catalog): scraper run — ${{ inputs.provider }} ${DATE} (#${{ github.run_id }})"

          git push origin "$BRANCH"

          NEW_COUNT=${{ steps.check_changes.outputs.new_files }}
          MOD_COUNT=${{ steps.check_changes.outputs.modified }}

          gh pr create \
            --title "chore(catalog): scraper run — ${{ inputs.provider }} ${DATE}" \
            --body "## Scraper auto-PR

          Triggered by \`workflow_dispatch\` on **${{ inputs.provider }}** — ${DATE}.

          | | Count |
          |---|---|
          | New model stubs | ${NEW_COUNT} |
          | Updated entries | ${MOD_COUNT} |

          ### Review checklist
          - [ ] Spot-check a few new model IDs look correct
          - [ ] Validator passed (confirmed by CI step above)
          - [ ] Merge when happy

          > Generated by the almanac scraper. All files passed \`almanac-validator\` before this PR was opened." \
            --draft \
            --base main \
            --head "$BRANCH"

      - name: No changes found
        if: steps.check_changes.outputs.has_changes == '0'
        run: echo "No new or modified model files found — catalog is already up to date."
