# Aliases map shorthand or version-pinned names to canonical model IDs.
# Keys are the alias strings developers might use; values are canonical IDs
# that exist in models/<provider>/<id>.yaml.

aliases:
  # OpenAI shorthand aliases
  gpt-4o-latest: gpt-4o
  gpt-4o-mini-latest: gpt-4o-mini
  gpt-4-turbo-latest: gpt-4-turbo
  gpt-4-latest: gpt-4
  o1-latest: o1
  o3-latest: o3
  o3-mini-latest: o3-mini

  # Anthropic shorthand aliases
  claude-opus-4: claude-opus-4-7
  claude-sonnet-4: claude-sonnet-4-6
  claude-haiku-4: claude-haiku-4-5-20251001
  claude-3-5-sonnet-latest: claude-3-5-sonnet-20241022
  claude-3-5-haiku-latest: claude-3-5-haiku-20241022
  claude-3-haiku-latest: claude-3-haiku-20240307
  claude-3-opus-latest: claude-3-opus-20240229

  # Google shorthand aliases
